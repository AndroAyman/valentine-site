<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لأجمل بنت في حياتي</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffccd5,#ffe6f0);
text-align:center;
overflow-x:hidden;
}

.section{
padding:60px 20px;
}

h1{
color:#cc0066;
}

button{
padding:10px 20px;
font-size:18px;
background:#e60073;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px;
}

img{
max-width:90%;
border-radius:20px;
margin-top:20px;
transition:0.4s;
cursor:pointer;
}

img:hover{
transform:scale(1.05);
}

/* Envelope */

.envelope{
width:200px;
height:120px;
background:#ff4d88;
margin:40px auto;
position:relative;
cursor:pointer;
border-radius:10px;
}

.envelope:before{
content:"";
position:absolute;
top:-60px;
left:0;
width:0;
height:0;
border-left:100px solid transparent;
border-right:100px solid transparent;
border-bottom:60px solid #ff4d88;
transition:0.5s;
}

.letter{
position:absolute;
width:90%;
height:90%;
background:white;
top:5%;
left:5%;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
opacity:0;
transition:0.5s;
padding:10px;
}

.envelope.open:before{
transform:rotateX(180deg);
}

.envelope.open .letter{
opacity:1;
}

/* Gallery */

.memories-slider{
display:flex;
gap:20px;
overflow-x:auto;
scroll-behavior:smooth;
padding:20px;
}

.memory{
width:250px;
height:320px;
object-fit:cover;
border-radius:20px;
transition:0.4s;
}

.memory:hover{
transform:scale(1.1);
}

.counter{
font-size:24px;
color:#cc0066;
margin-top:20px;
}
</style>
</head>

<body>

<!-- Background Song -->
<audio autoplay loop>
<source src="Amr Diab - Khalik Maaya _ عمرو دياب - خليك معايا(MP3_160K).mp3" type="audio/mpeg">
</audio>

<div class="section">
<h1>بحبك يا أجمل حاجة في حياتي ❤️</h1>
<p>الموقع ده معمول مخصوص عشانك</p>
</div>

<div class="section">
<h1>أول صورة لينا</h1>
<img src="20240828_225632_IMG_7400.HEIC">
</div>

<div class="section">
<h1>اليوم اللي قولتلك فيه بحبك</h1>
<img src="20250122_210138_IMG_1492.HEIC">
</div>

<div class="section">
<h1>ذكرياتنا الحلوة</h1>

<div class="memories-slider">
<img src="20250210_140037_IMG_1811.HEIC" class="memory">
<img src="20250216_161106_IMG_1987.HEIC" class="memory">
<img src="20250222_181243_IMG_2160.HEIC" class="memory">
<img src="IMG-20250502-WA0226.jpg" class="memory">
<img src="IMG-20260108-WA0010.jpg" class="memory">
<img src="Snapchat-1286199120.jpg" class="memory">
<img src="Snapchat-1744675584.jpg" class="memory">
</div>

</div>

<div class="section">
<h1>رسالة ليكي</h1>

<div class="envelope" onclick="openEnvelope(this)">
<div class="letter">
من يوم 22 يناير 2024  
وانتي أحلى قرار أخدته في حياتي  
وكل يوم بحبك أكتر من اللي قبله ❤️
</div>
</div>

</div>

<div class="section">
<h1>عدّاد حبنا</h1>
<div class="counter" id="loveCounter"></div>
</div>

<script>

/* Envelope */
function openEnvelope(el){
el.classList.toggle("open");
}

/* Auto Scroll Gallery */
const slider = document.querySelector('.memories-slider');
setInterval(()=>{
slider.scrollLeft += 270;
if(slider.scrollLeft >= slider.scrollWidth - slider.clientWidth){
slider.scrollLeft = 0;
}
},2500);

/* Love Counter */
const startDate = new Date("2024-01-22");

function updateCounter(){
const now = new Date();
const diff = now - startDate;
const days = Math.floor(diff / (1000*60*60*24));
document.getElementById("loveCounter").innerHTML =
days + " يوم مع بعض ❤️";
}

updateCounter();
setInterval(updateCounter,1000);

</script>

</body>
</html>
